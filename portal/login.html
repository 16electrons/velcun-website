<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - VELCUN Customer Portal</title>
  <link rel="stylesheet" href="/css/styles.css?v=20260613p" />
  <link rel="stylesheet" href="/portal/portal.css?v=20260613p" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="14" fill="#f59e0b"/>
            <path d="M16 8 L16 24 M8 16 L24 16" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>VELCUN</h1>
        <p class="login-subtitle">Customer Portal</p>
      </div>

      <div class="login-tabs">
        <button class="login-tab active" data-tab="login">Login</button>
        <button class="login-tab" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form active" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>
        
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember" />
            <span>Remember me</span>
          </label>
          <a href="/forgot-password" class="forgot-password">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="login-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" name="name" placeholder="Enter your full name" required />
        </div>
        
        <div class="form-group">
          <label for="reg-company">Company</label>
          <input type="text" id="reg-company" name="company" placeholder="Enter your company name" required />
        </div>
        
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" name="email" placeholder="Enter your email" required />
        </div>
        
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" placeholder="Create a password" required />
        </div>
        
        <div class="form-group">
          <label for="reg-confirm-password">Confirm Password</label>
          <input type="password" id="reg-confirm-password" name="confirmPassword" placeholder="Confirm your password" required />
        </div>
        
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="terms" required />
            <span>I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a></span>
          </label>
        </div>
        
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <div class="login-footer">
        <p>By continuing, you agree to VELCUN's <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.</p>
      </div>
    </div>
  </div>

  <script src="/portal/login.js?v=20260613p"></script>
</body>
</html>
